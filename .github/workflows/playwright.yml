name: Playwright E2E Tests on Vercel Deploy

# Lắng nghe sự kiện báo cáo Deployment từ Vercel qua GitHub
on:
  deployment_status:

jobs:
  run-e2e-tests:
    # Chỉ chạy Test khi Vercel trả về trạng thái SUCCESS báo hiệu đã Build và Deploy xong
    if: github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests hitting Vercel URL
      env:
        # Vercel tự động cấp URL động qua biến target_url của webhook deployment_status
        PLAYWRIGHT_TEST_BASE_URL: ${{ github.event.deployment_status.target_url }}
      run: npx playwright test

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 2

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Projekt-T Liên Quân Mobile</title>
    <meta name="description" content="Trang đăng nhập dành cho quản trị viên và thành viên Projekt-T.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="bg-visuals">
        <div class="bg-glow"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i data-lucide="shield-check"></i>
                </div>
                <h1>Chào mừng trở lại</h1>
                <p>Đăng nhập để quản lý đội hình vĩ đại của bạn</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="username">Tài khoản</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập..." required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Ghi nhớ tôi</span>
                    </label>
                    <a href="#" class="forgot-pass">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Đăng Nhập Ngay
                </button>
            </form>

            <div class="login-footer">
                <p>Chưa có tài khoản? <a href="#">Gia nhập ngay</a></p>
                <a href="index.html" class="back-home">
                    <i data-lucide="arrow-left"></i>
                    Quay về Trang chủ
                </a>
            </div>
        </div>
    </div>

    <script>
        // Khởi tạo Lucide Icons
        lucide.createIcons();

        // Xử lý Form Login
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Hiệu ứng loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Đang xác thực...';

            try {
                // Giả lập xử lý đăng nhập - Sau này có thể kết nối với API thực tế
                await new Promise(resolve => setTimeout(resolve, 1500));

                if (username === 'admin' && password === 'admin') {
                    // Thành công
                    window.location.href = 'admin.html';
                } else {
                    // Thất bại
                    alert('Sai tài khoản hoặc mật khẩu! (Gợi ý: admin/admin)');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Đăng Nhập Ngay';
                }
            } catch (error) {
                console.error('Lỗi đăng nhập:', error);
                alert('Có lỗi xảy ra, vui lòng thử lại sau.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Đăng Nhập Ngay';
            }
        });
    </script>
</body>
</html>

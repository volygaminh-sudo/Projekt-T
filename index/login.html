<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Projekt-T Liên Quân Mobile</title>
    <meta name="description" content="Trang đăng nhập dành cho quản trị viên và thành viên Projekt-T.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="login.css">
</head>
<body class="home-body">
    <!-- Video Background Synchronization -->
    <div class="home-background">
        <video autoplay muted loop id="bg-video" poster="img/airi-tnvt.jpg">
            <source src="img/freecompress-live-wallpaper.mp4" type="video/mp4">
        </video>
    </div>
    <div class="glow-orb"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i data-lucide="shield-check"></i>
                </div>
                <h1>Chào mừng trở lại</h1>
                <p>Đăng nhập để quản lý đội hình vĩ đại của bạn</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="username">Tài khoản</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập..." required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Ghi nhớ tôi</span>
                    </label>
                    <a href="#" class="forgot-pass">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Đăng Nhập Ngay
                </button>
            </form>

            <div class="login-footer">
                <p>Chưa có tài khoản? <a href="register.html">Gia nhập ngay</a></p>
                <a href="index.html" class="back-home">
                    <i data-lucide="arrow-left"></i>
                    Quay về Trang chủ
                </a>
            </div>
        </div>
    </div>

    <script>
        // Khởi tạo Lucide Icons
        lucide.createIcons();

        // Xử lý Form Login
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Hiệu ứng loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Đang xác thực...';

            try {
                const _apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:3000/api' : '/api';
                const response = await fetch(`${_apiBase}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Lưu thông tin người dùng vào localStorage
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Nếu là admin thì vẫn qua trang quản trị, nếu không thì về trang chủ hoặc tier-list
                    if (data.user.username === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'tier-list.html';
                    }
                } else {
                    // Thất bại
                    alert(data.error || 'Sai tài khoản hoặc mật khẩu! (Gợi ý: admin/admin)');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Đăng Nhập Ngay';
                }
            } catch (error) {
                console.error('Lỗi đăng nhập:', error);
                alert('Không thể kết nối tới server. Vui lòng thử lại sau.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Đăng Nhập Ngay';
            }
        });
    </script>
</body>
</html>

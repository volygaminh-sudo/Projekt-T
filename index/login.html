<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Projekt-T Liên Quân Mobile</title>
    <meta name="description" content="Trang đăng nhập dành cho quản trị viên và thành viên Projekt-T.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="home-body">
    <!-- Video Background Synchronization -->
    <div class="home-background"></div>
    <div class="glow-orb"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i data-lucide="shield-check"></i>
                </div>
                <h1>Chào mừng trở lại</h1>
                <p>Đăng nhập để quản lý đội hình vĩ đại của bạn</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="username">Email / Tài khoản</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="text" id="username" name="username" placeholder="Nhập email đăng nhập..." required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Ghi nhớ tôi</span>
                    </label>
                    <a href="#" class="forgot-pass">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Đăng Nhập Ngay
                </button>
            </form>

            <div class="divider">
                <span>Hoặc</span>
            </div>

            <button type="button" class="btn-google" id="googleLoginBtn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
                Đăng nhập nhanh bằng Gmail
            </button>

            <div class="login-footer">
                <p>Chưa có tài khoản? <a href="register.html">Gia nhập ngay</a></p>
                <a href="index.html" class="back-home">
                    <i data-lucide="arrow-left"></i>
                    Quay về Trang chủ
                </a>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // ===== TOAST SYSTEM (BUG-003 FIX) =====
        function showToast(msg, type = 'error', duration = 4000) {
            const icons = { error: '❌', success: '✅', info: 'ℹ️', warning: '⚠️' };
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span class="toast-icon">${icons[type] || 'ℹ️'}</span><span class="toast-msg">${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 350);
            }, duration);
        }

        // Khởi tạo Lucide Icons
        lucide.createIcons();

        // Xử lý Form Login
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (username.toLowerCase() !== 'admin' && !emailRegex.test(username)) {
                showToast('Vui lòng nhập email hợp lệ (hoặc "admin" cho quản trị viên).', 'warning');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Đang xác thực...';

            try {
                const _apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://127.0.0.1:3008/api' : '/api';
                const response = await fetch(`${_apiBase}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showToast('Đăng nhập thành công! Đang chuyển hướng...', 'success', 1500);
                    setTimeout(() => {
                        window.location.href = data.user.username === 'admin' ? 'admin.html' : 'tier-list.html';
                    }, 1000);
                } else {
                    showToast(data.error || 'Sai tài khoản hoặc mật khẩu! (Gợi ý: admin/admin)', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Đăng Nhập Ngay';
                }
            } catch (error) {
                console.error('Lỗi đăng nhập:', error);
                showToast('Không thể kết nối tới server. Vui lòng thử lại sau.', 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Đăng Nhập Ngay';
            }
        });

        // Xử lý Google Login (Mô phỏng)
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            const mockEmail = prompt('Nhập Email Gmail của bạn (Mô phỏng Đăng nhập Google):');
            if (mockEmail === null) return;
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(mockEmail)) {
                showToast('Email không hợp lệ! Vui lòng nhập đúng định dạng.', 'warning');
                return;
            }
            
            const btn = document.getElementById('googleLoginBtn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = 'Đang xác thực...';
            btn.disabled = true;

            try {
                const _apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://127.0.0.1:3008/api' : '/api';
                const response = await fetch(`${_apiBase}/google-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: mockEmail })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showToast('Đăng nhập thành công!', 'success', 1500);
                    setTimeout(() => { window.location.href = 'tier-list.html'; }, 1000);
                } else {
                    showToast(data.error || 'Lỗi đăng nhập Google', 'error');
                }
            } catch (error) {
                console.error('Lỗi đăng nhập Google:', error);
                showToast('Không thể kết nối tới server.', 'error');
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

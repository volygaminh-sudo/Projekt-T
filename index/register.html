<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia nhập Projekt-T | Đăng ký thành viên</title>
    <meta name="description" content="Tạo tài khoản Projekt-T để tùy chỉnh Tier List và quản lý đội hình của riêng bạn.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="login.css">
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="home-body">
    <!-- Video Background Synchronization -->
    <div class="home-background"></div>
    <div class="glow-orb"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i data-lucide="user-plus"></i>
                </div>
                <h1>Bắt đầu hành trình</h1>
                <p>Khởi tạo tài khoản để lưu lại những chiến thuật đỉnh cao</p>
            </div>

            <form class="login-form" id="registerForm">
                <div class="input-group">
                    <label for="display_name">Tên hiển thị</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="display_name" name="display_name" placeholder="VD: Chiến Thần Bình Nguyên..." required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="username">Email đăng nhập</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="text" id="username" name="username" placeholder="Nhập email hợp lệ..." required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu an toàn..." required autocomplete="new-password">
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm_password">Xác nhận mật khẩu</label>
                    <div class="input-wrapper">
                        <i data-lucide="shield-check"></i>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu..." required autocomplete="new-password">
                    </div>
                </div>

                <button type="submit" class="btn-login" id="registerBtn">
                    Gia Nhập Ngay
                </button>
            </form>

            <div class="divider">
                <span>Hoặc</span>
            </div>

            <button type="button" class="btn-google" id="googleLoginBtn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
                Đăng ký nhanh bằng Gmail
            </button>

            <div class="login-footer">
                <p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
                <a href="index.html" class="back-home">
                    <i data-lucide="arrow-left"></i>
                    Quay về Trang chủ
                </a>
            </div>
        </div>
    </div>

    <script>
        // Khởi tạo Lucide Icons
        lucide.createIcons();

        // Xử lý Form Register
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const display_name = document.getElementById('display_name').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(username)) {
                alert('Vui lòng nhập một địa chỉ email hợp lệ!');
                return;
            }

            if (password !== confirm_password) {
                alert('Mật khẩu xác nhận không khớp!');
                return;
            }

            // Hiệu ứng loading
            registerBtn.disabled = true;
            registerBtn.innerHTML = 'Đang xử lý...';

            try {
                const _apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://127.0.0.1:3008/api' : '/api';
                const response = await fetch(`${_apiBase}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, display_name })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Đăng ký thành công! Hãy đăng nhập để bắt đầu.');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Có lỗi xảy ra khi đăng ký.');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = 'Gia Nhập Ngay';
                }
            } catch (error) {
                console.error('Lỗi đăng ký:', error);
                alert('Không thể kết nối tới server. Vui lòng thử lại sau.');
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Gia Nhập Ngay';
            }
        });

        // Xử lý Google Login Form (Mô phỏng)
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            const mockEmail = prompt('Vui lòng nhập Email Gmail của bạn (Mô phỏng Đăng nhập Google):');
            if (mockEmail === null) return; // Hủy
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(mockEmail)) {
                alert('Email không hợp lệ! Vui lòng nhập đúng định dạng.');
                return;
            }
            
            const btn = document.getElementById('googleLoginBtn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = 'Đang xử lý...';
            btn.disabled = true;

            try {
                const _apiBase = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://127.0.0.1:3008/api' : '/api';
                const response = await fetch(`${_apiBase}/google-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: mockEmail })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'tier-list.html';
                } else {
                    alert(data.error || 'Lỗi đăng nhập Google');
                }
            } catch (error) {
                console.error('Lỗi đăng nhập Google:', error);
                alert('Không thể kết nối tới server.');
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

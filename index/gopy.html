<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <title>Góp Ý - Liên Quân</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gopy.css">
    <link rel="stylesheet" href="quick-admin.css">
</head>
<body class="home-body">
    <script src="music.js"></script>
    <div class="home-background">
        <video autoplay muted loop id="bg-video" poster="img/airi-tnvt.jpg">
            <source src="img/freecompress-live-wallpaper.mp4" type="video/mp4">
        </video>
    </div>
    <div class="glow-orb"></div>

    <!-- Music Toggle -->
    <div id="music-toggle" class="music-controller" title="Bật/Tắt nhạc nền">
        <div class="music-icon">
            <span></span><span></span><span></span><span></span>
        </div>
        <span class="music-text">NHẠC NỀN</span>
    </div>
    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="img/unnamed.webp" alt="Logo">
                    <span class="download-badge">GÓP Ý</span>
                </a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="tier-list.html">Tier-list</a></li>
                    <li><a href="new-hero.html">Tướng Mới</a></li>
                    <li><a href="capnhat.html">Cập nhật</a></li>
                    <li><a href="gopy.html" class="active">Góp ý</a></li>
                    <li id="nav-login"><a href="login.html">Đăng nhập</a></li>
                    <li id="nav-user" class="nav-hidden"><a href="#" id="logoutBtn">Đăng xuất (<span id="username-display"></span>)</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <script src="auth-check.js"></script>

    <main class="page-content gopy-main">
        <section class="gopy-container">
            <h1 class="glow-title">GỬI <span class="highlight">GÓP Ý</span></h1>
            <p style="text-align: center; color: #ccc;">Hãy gửi những phản hồi và ý kiến để giúp trang web phát triển tốt hơn!</p>
            <form id="feedback-form" class="gopy-form">
                <div class="form-group">
                    <label>Tên của bạn <span class="required">*</span></label>
                    <input type="text" id="fb-name" required placeholder="Tên hiển thị">
                </div>
                <div class="form-group">
                    <label>Email liên hệ</label>
                    <input type="email" id="fb-email" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>Chủ đề</label>
                    <input type="text" id="fb-subject" placeholder="Tiêu đề góp ý">
                </div>
                <div class="form-group">
                    <label>Nội dung <span class="required">*</span></label>
                    <textarea id="fb-message" rows="5" required placeholder="Nhập nội dung chi tiết..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Gửi Phản Hồi</button>
            </form>
            <div id="fb-status" class="status-msg"></div>
        </section>
    </main>

    <script src="gopy.js"></script>
</body>
</html>
